<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tính Điểm IT</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="it-panel">
      <div class="panel-header">
        <div class="header-top">
          <div class="panel-title">Tính Điểm IT</div>
          <div class="auto-sync-wrapper">
            <span class="auto-sync-label">Auto Gmail</span>
            <label class="switch">
              <input type="checkbox" id="auto-sync-toggle" checked>
              <span class="slider round"></span>
            </label>
          </div>
        </div>
        <div class="header-bottom">
          <div class="search-box">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="search-subject" placeholder="Tìm môn học..." />
          </div>
          <div id="subject-count-info" class="subject-count-info">
            Tổng cộng: <span id="total-subjects-count">0</span> môn
          </div>
        </div>
      </div>

        <div class="bulk-scan-section">
          <div class="bulk-scan-actions">
            <button id="bulk-scan-btn" class="btn btn-bulk" title="Quét tất cả email điểm đang hiển thị">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
              </svg>
              Quét toàn bộ trang Gmail
            </button>
            <button id="stop-scan-btn" class="btn btn-stop hidden" title="Dừng quét">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              </svg>
              Dừng quét
            </button>
          </div>
          <div id="scan-progress-container" class="progress-container hidden">
            <div class="progress-text">Đang quét: <span id="scan-count">0</span> email...</div>
            <div class="progress-bar">
              <div id="scan-progress-fill" class="progress-fill"></div>
            </div>
          </div>
        </div>

        <div class="panel-body">
        <div class="add-section">
          <div class="input-group">
            <div class="flex-row">
              <select id="subject-select">
                <option value="Python">Python</option>
                <option value="JavaScript">JavaScript</option>
                <option value="C++">C++</option>
                <option value="Java">Java</option>
                <option value="SQL">SQL</option>
                <option value="custom">-- Nhập tên môn khác --</option>
              </select>
              <button id="add-subject-btn" class="btn btn-secondary" title="Thêm môn học">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="5" x2="12" y2="19"></line>
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
              </button>
              <button id="sort-subject-btn" class="btn btn-secondary" title="Sắp xếp nhóm môn học">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 6h10"></path>
                  <path d="M3 12h6"></path>
                  <path d="M3 18h6"></path>
                  <path d="M14 15l4 4 4-4"></path>
                  <path d="M18 19V5"></path>
                </svg>
              </button>
            </div>
            <input
              type="text"
              id="custom-subject"
              class="hidden"
              placeholder="Nhập tên môn học..."
            />
          </div>
        </div>

        <div id="subjects-container" class="subjects-list">
          <!-- Dynamic subject cards will be added here -->
        </div>
      </div>

      <button id="back-to-top-btn" class="back-to-top-btn" title="Lên đầu trang">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
      </button>

      <div class="footer">
        <div class="footer-actions">
          <button id="clear-all-btn" class="btn btn-outline-danger" title="Xóa tất cả dữ liệu">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              <line x1="10" y1="11" x2="10" y2="17"></line>
              <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
            Xóa hết
          </button>
          <button id="export-btn" class="btn btn-primary">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Xuất Excel
          </button>
        </div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
